services:
  app:
    build: .
    ports: 
      - "5000:5000"
    depends_on:
      - mongodb 
      
  mongodb:
    image: mongo:latest
    ports:
      - "27018:27017"
    volumes:
      - movie_db:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  movie_db:
  redis_data: